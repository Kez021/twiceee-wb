<!-- KEEP ALL YOUR ORIGINAL HEAD DATA -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kez Media</title>
<meta name="theme-color" content="#e2688a">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ... SPLASH AND AUTH STAY THE SAME ... -->
<div id="splashScreen">
  <div class="splash-logo">Kez Media</div>
  <div class="splash-tagline">Your photos. Your story. Your space.</div>
  <div class="splash-dots"><div class="splash-dot"></div><div class="splash-dot"></div><div class="splash-dot"></div></div>
</div>

<div id="authOverlay">
  <div class="ac">
    <div class="ac-brand">Kez Media</div>
    <div class="ac-tabs">
      <button class="ac-tab on" id="t-in" onclick="authTab('in')">Sign In</button>
      <button class="ac-tab" id="t-up" onclick="authTab('up')">Create Account</button>
    </div>
    <div class="ac-err" id="authErr"></div>
    <input class="ac-inp" id="aEmail" type="email" placeholder="Email address">
    <input class="ac-inp" id="aPass" type="password" placeholder="Password">
    <input class="ac-inp" id="aName" type="text" placeholder="Your name" style="display:none">
    <button class="ac-btn" id="aBtn" onclick="authSubmit()">Sign In</button>
    <div class="ac-or">or</div>
    <button class="ac-google" onclick="authGoogle()">Continue with Google</button>
  </div>
</div>

<nav>
  <div class="brand" onclick="goTo('home')">Kez Media</div>
  <div class="nav-search">
    <span class="si"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="text" placeholder="Search..." id="navSearchInput" oninput="searchAll(this.value)">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <div class="nav-right">
    <!-- FIX: NOTIFICATIONS ON TOP FOR MOBILE -->
    <button class="icon-btn mobile-top-notif" onclick="goTo('notifs')" title="Notifications">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="badge" id="notifBadge">0</span>
    </button>
    <!-- DARK MODE HIDDEN ON MOBILE TOP -->
    <button class="theme-btn desktop-top-theme" onclick="toggleTheme()" title="Toggle theme">
      <span id="themeIcon"></span>
    </button>
    <div class="nav-avatar" id="navAvatar" onclick="goTo('profile')">Y</div>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar-left">
    <div class="menu-item active" id="mn-home" onclick="goTo('home')">🏠 Home</div>
    <div class="menu-item" id="mn-explore" onclick="goTo('explore')">🌍 Explore</div>
    <div class="menu-item" id="mn-notifs" onclick="goTo('notifs')">🔔 Notifications <span class="menu-badge" id="mnNotifBadge">0</span></div>
    <div class="menu-item" id="mn-messages" onclick="goTo('messages')">💬 Messages <span class="menu-badge" id="mnMsgBadge">0</span></div>
    <div class="menu-item" id="mn-profile" onclick="goTo('profile')">👤 Profile</div>
    <!-- ADDED THEME TOGGLE TO SIDEBAR -->
    <div class="menu-item" onclick="toggleTheme()">🌓 Toggle Dark Mode</div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="doSignOut()" style="color:#e05577;">🚪 Sign Out</div>
  </aside>

  <main>
    <div class="view active" id="view-home">
      <div class="stories-wrap">
        <div class="stories-row" id="storiesRow">
          <div class="story-item" onclick="openStoryModal()">
            <div class="story-ring add-ring"><div class="story-avatar">+</div></div>
            <div class="story-name">Add Story</div>
          </div>
        </div>
      </div>
      <div class="create-bar">
        <div class="nav-avatar" id="createAvatar">Y</div>
        <!-- MENTIONS CONTAINER -->
        <div style="flex:1; position:relative;">
            <input class="create-input" type="text" placeholder="Share something beautiful... (@mention)" oninput="handleMentionInput(this, 'main')">
            <div id="mentionMain" class="mention-dropdown"></div>
        </div>
      </div>
      <div id="feed"></div>
    </div>

    <!-- PROFILE VIEW -->
    <div class="view" id="view-profile">
      <div class="profile-card">
        <div class="profile-banner" id="profileBanner">
          <img class="banner-img" id="bannerImg">
          <div class="profile-banner-btns">
            <label class="profile-banner-edit" for="bannerUploadInp">📸 Upload Cover</label>
            <input type="file" id="bannerUploadInp" hidden onchange="uploadBanner(this)">
          </div>
        </div>
        <div class="profile-top">
          <div class="profile-av-wrap">
            <div class="profile-av" id="profileAv" onclick="document.getElementById('avatarUpload').click()">
              <span id="profileAvInitial">Y</span>
              <input type="file" id="avatarUpload" hidden onchange="uploadAvatar(this)">
            </div>
            <div class="profile-actions">
              <!-- FIX: EDIT PROFILE ON PROFILE SECTION -->
              <button class="edit-profile-btn" onclick="goTo('settings')">Edit Profile</button>
            </div>
          </div>
          <div class="profile-name" id="profileName">User</div>
          <div class="profile-handle" id="profileHandle">@handle</div>
          <div class="profile-bio" id="profileBio">Welcome!</div>
        </div>
      </div>
      <div id="grid" class="post-grid"></div>
    </div>

    <div class="view" id="view-notifs">
        <div class="page-header"><div class="page-title">Notifications</div></div>
        <div id="notifList"></div>
    </div>
  </main>
</div>

<!-- POST MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head"><h3>New Post</h3><button onclick="closeModal()">×</button></div>
    <div style="position:relative;">
        <textarea id="postInput" placeholder="Caption... Use @ to mention people" oninput="handleMentionInput(this, 'modal')"></textarea>
        <div id="mentionModal" class="mention-dropdown"></div>
    </div>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" multiple hidden onchange="handleFiles(this)">
      <p>Tap to add photos</p>
    </div>
    <div id="uploadPreviews" class="upload-previews"></div>
    <button class="btn btn-pink" onclick="submitPost()">Post Now</button>
  </div>
</div>

<!-- STORY VIEWER -->
<div id="storyViewer">
    <div class="sv-progress-bar" id="svProgressBar"></div>
    <div class="sv-header">
      <div class="sv-av" id="svAv"></div>
      <div class="sv-name" id="svName"></div>
      <button class="sv-close" onclick="closeStoryViewer()">×</button>
    </div>
    <div class="sv-media" id="svMedia"></div>
    <!-- STORY VIEWERS LIST -->
    <div id="svViewerList" class="sv-viewer-list"></div>
    <button id="svViewersBtn" class="sv-viewers-btn" style="display:none" onclick="toggleStoryViewers()">👁️ Viewers</button>
</div>

<!-- STORY MODAL -->
<div id="storyModal" class="overlay">
    <div class="modal">
      <h3>Share a Story</h3>
      <input type="file" id="storyFileInput" onchange="handleStoryFile(this)">
      <button class="btn btn-pink" onclick="publishStory()">Upload Story</button>
    </div>
</div>

<div class="toast" id="toastEl"></div>

<nav class="mobile-bottom-nav">
  <div class="mob-nav-item" onclick="goTo('home')">🏠</div>
  <div class="mob-nav-item" onclick="goTo('explore')">🌍</div>
  <div class="mob-nav-item mob-nav-create" onclick="openModal()"><div class="mob-create-btn">+</div></div>
  <div class="mob-nav-item" onclick="goTo('messages')">💬</div>
  <div class="mob-nav-item" onclick="goTo('profile')">👤</div>
</nav>

<script src="app.js"></script>
</body>
</html>
