<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kez Media</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="splashScreen">
  <div class="splash-logo">Kez Media</div>
  <div class="splash-dots"><div class="splash-dot"></div><div class="splash-dot"></div><div class="splash-dot"></div></div>
</div>

<div id="authOverlay">
  <div class="ac">
    <div class="ac-brand">Kez Media</div>
    <div class="ac-tabs">
      <button class="ac-tab on" id="t-in" onclick="authTab('in')">Sign In</button>
      <button class="ac-tab" id="t-up" onclick="authTab('up')">Join</button>
    </div>
    <div class="ac-err" id="authErr"></div>
    <input class="ac-inp" id="aEmail" type="email" placeholder="Email">
    <input class="ac-inp" id="aPass" type="password" placeholder="Password">
    <input class="ac-inp" id="aName" type="text" placeholder="Full Name" style="display:none">
    <button class="ac-btn" onclick="authSubmit()">Continue</button>
    <button class="ac-google" onclick="authGoogle()">Continue with Google</button>
  </div>
</div>

<nav>
  <div class="brand" onclick="goTo('home')">Kez Media</div>
  <div class="nav-search">
    <input type="text" placeholder="Search people..." oninput="handleMentionInput(this, 'nav')">
    <div class="mention-dropdown" id="mentionNav"></div>
  </div>
  <div class="nav-right">
    <button class="icon-btn mobile-top-notif" onclick="goTo('notifs')">🔔<span class="badge" id="notifBadge">0</span></button>
    <button class="theme-btn desktop-top-theme" onclick="toggleTheme()"><span id="themeIcon">🌙</span></button>
    <div class="nav-avatar" id="navAvatar" onclick="goTo('profile')">K</div>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar-left">
    <div class="menu-item active" onclick="goTo('home')">🏠 Home</div>
    <div class="menu-item" onclick="goTo('explore')">🌍 Explore</div>
    <div class="menu-item" onclick="goTo('notifs')">🔔 Notifs <span class="menu-badge" id="mnNotifBadge">0</span></div>
    <div class="menu-item" onclick="goTo('profile')">👤 Profile</div>
    <div class="menu-item" onclick="toggleTheme()">🌓 Theme</div>
    <div class="menu-divider"></div>
    <div class="menu-item" onclick="doSignOut()" style="color:#ef4444">🚪 Logout</div>
  </aside>

  <main>
    <div class="view active" id="view-home">
      <div class="stories-wrap"><div class="stories-row" id="storiesRow">
          <div class="story-item" onclick="openStoryModal()">
            <div class="story-ring add-ring"><div class="story-avatar">+</div></div>
            <div class="story-name">Add Story</div>
          </div>
      </div></div>
      <div class="create-bar">
        <div class="nav-avatar" id="createAvatar">K</div>
        <div style="flex:1; position:relative;">
            <input class="create-input" type="text" placeholder="What's happening? @mention" oninput="handleMentionInput(this, 'main')">
            <div id="mentionMain" class="mention-dropdown"></div>
        </div>
      </div>
      <div id="feed"></div>
    </div>

    <div class="view" id="view-profile">
      <div class="profile-card">
        <div class="profile-banner" id="profileBanner">
          <img id="bannerImg" class="banner-img">
          <div class="profile-banner-btns">
            <label class="profile-banner-edit" for="bannerInp">📸 Upload Cover</label>
            <input type="file" id="bannerInp" hidden onchange="uploadBanner(this)">
          </div>
        </div>
        <div class="profile-top">
          <div class="profile-av-wrap">
            <div class="profile-av" id="profileAv" onclick="document.getElementById('avatarUpload').click()">
              <span id="profileAvInitial">K</span>
              <input type="file" id="avatarUpload" hidden onchange="uploadAvatar(this)">
            </div>
            <button class="edit-profile-btn" onclick="goTo('settings')">Edit Profile</button>
          </div>
          <div class="profile-name" id="profileName">User</div>
          <div class="profile-handle" id="profileHandle">@handle</div>
          <div class="profile-bio" id="profileBio">✨ Welcome to my space!</div>
        </div>
      </div>
      <div id="grid" class="post-grid"></div>
    </div>
  </main>
</div>

<!-- POST MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head"><h3>New Post</h3><button onclick="closeModal()">×</button></div>
    <div style="position:relative;">
        <textarea id="postInput" placeholder="Use @ to mention anyone..." oninput="handleMentionInput(this, 'modal')"></textarea>
        <div id="mentionModal" class="mention-dropdown"></div>
    </div>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" multiple hidden onchange="handleFiles(this)">
      <p>📸 Tap to add photos</p>
    </div>
    <div id="uploadPreviews" class="upload-previews"></div>
    <button class="btn btn-pink" onclick="submitPost()">Post Now</button>
  </div>
</div>

<!-- STORY VIEWER -->
<div id="storyViewer">
  <div class="sv-header">
    <div class="sv-av" id="svAv"></div>
    <div class="sv-name" id="svName"></div>
    <button class="sv-close" onclick="closeStoryViewer()">×</button>
  </div>
  <div class="sv-media" id="svMedia"></div>
  <div id="svViewerList" class="sv-viewer-list"></div>
  <button id="svViewersBtn" class="sv-viewers-btn" style="display:none" onclick="toggleStoryViewers()">👁️ Viewers</button>
</div>

<div class="toast" id="toastEl"></div>

<script src="app.js"></script>
</body>
</html>
